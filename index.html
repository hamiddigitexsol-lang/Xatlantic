    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Xatlantic Patches" />

    <!--
      Static, site-wide Organization schema — present in every page's raw
      HTML (unlike src/components/Seo.jsx's per-route JSON-LD, which is
      injected by React after JS runs). This is a React SPA, so any crawler
      or tool that doesn't execute JavaScript otherwise sees no schema.org
      data and no links at all in the raw HTML.
    -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Xatlantic Patches",
        "url": "https://xatlanticpatches.com",
        "logo": "https://xatlanticpatches.com/logo.png",
        "telephone": "+1 (214) 778-5220",
        "email": "hello@xatlanticpatches.com",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "10601 Clarence Dr",
          "addressLocality": "Frisco",
          "addressRegion": "TX",
          "postalCode": "75033",
          "addressCountry": "US"
        }
      }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>Xatlantic Patches | Custom Patches & Emblems</title>
  </head>
  <body>
    <div id="root"></div>

    <!--
      Fallback content for crawlers/tools that don't execute JavaScript —
      this is a client-rendered React app, so without this, a non-JS
      crawler sees zero links and zero content in the raw HTML.
    -->
    <noscript>
      <h1>Xatlantic Patches — Custom Patches &amp; Emblems</h1>
      <p>
        Premium custom embroidered, chenille, PVC, leather &amp; woven patches, plus pins, coins,
        and promotional products. Low minimums, free digital proof, fast turnaround.
      </p>
      <nav>
        <a href="/">Home</a>
        <a href="/products">All Products</a>
        <a href="/products/embroidered-patches">Embroidered Patches</a>
        <a href="/products/pvc-patches">PVC Patches</a>
        <a href="/products/leather-patches">Leather Patches</a>
        <a href="/patches">Patch Styles</a>
        <a href="/pricing">Pricing</a>
        <a href="/gallery">Gallery</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
      </nav>
    </noscript>

    <script type="module" src="/src/main.jsx"></script>

    <!--
      Hidden static forms so Netlify's build-time bot can detect and register
      these forms (Netlify Forms requires a plain HTML <form> with matching
      field names — the live React forms submit to these via fetch()).
    -->
    <form name="quote-request" data-netlify="true" netlify-honeypot="bot-field" enctype="multipart/form-data" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="phone" />
      <input type="text" name="product" />
      <input type="text" name="backing" />
      <input type="text" name="quantity" />
      <input type="text" name="width" />
      <input type="text" name="height" />
      <input type="file" name="artwork" />
      <textarea name="notes"></textarea>
    </form>
    <form name="calculator-quote" data-netlify="true" netlify-honeypot="bot-field" enctype="multipart/form-data" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="phone" />
      <input type="text" name="product" />
      <input type="text" name="size" />
      <input type="text" name="backing" />
      <input type="text" name="quantity" />
      <input type="text" name="price_per_unit" />
      <input type="text" name="estimated_total" />
      <input type="text" name="turnaround" />
      <input type="file" name="artwork" />
      <textarea name="notes"></textarea>
    </form>

        s1.setAttribute('crossorigin', '*')
        s0.parentNode.insertBefore(s1, s0)
      })()
    </script>
    <!--End of Tawk.to Script-->
  </body>
</html>
