<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Xatlantic Patches — premium custom embroidered, chenille, PVC, leather, and woven patches plus pins, coins, and promotional products. Custom emblems, crafted to a premium standard."
    />
    <meta name="theme-color" content="#ffffff" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Xatlantic Patches | Custom Patches & Emblems" />
    <meta
      property="og:description"
      content="Premium custom patches and promotional products. Low minimums, premium materials, fast turnaround."
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>Xatlantic Patches | Custom Patches & Emblems</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!--
      Hidden static forms so Netlify's build-time bot can detect and register
      these forms (Netlify Forms requires a plain HTML <form> with matching
      field names — the live React forms submit to these via fetch()).
    -->
    <form name="quote-request" data-netlify="true" netlify-honeypot="bot-field" enctype="multipart/form-data" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="phone" />
      <input type="text" name="product" />
      <input type="text" name="backing" />
      <input type="text" name="quantity" />
      <input type="text" name="width" />
      <input type="text" name="height" />
      <input type="file" name="artwork" />
      <textarea name="notes"></textarea>
    </form>
    <form name="calculator-quote" data-netlify="true" netlify-honeypot="bot-field" enctype="multipart/form-data" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="phone" />
      <input type="text" name="product" />
      <input type="text" name="size" />
      <input type="text" name="backing" />
      <input type="text" name="quantity" />
      <input type="text" name="price_per_unit" />
      <input type="text" name="estimated_total" />
      <input type="text" name="turnaround" />
      <input type="file" name="artwork" />
      <textarea name="notes"></textarea>
    </form>

    <!--Start of Tawk.to Script-->

        s1.charset = 'UTF-8'
        s1.setAttribute('crossorigin', '*')
        s0.parentNode.insertBefore(s1, s0)
      })()
    </script>
    <!--End of Tawk.to Script-->
  </body>
</html>
